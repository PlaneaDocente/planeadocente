<!DOCTYPE html>
<html>
<head>
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<h1>Planea Docente</h1>
<button id="pagar">Comprar</button>

<script>
const stripe = Stripe('pk_test_TU_CLAVE_PUBLICA');

document.getElementById('pagar').addEventListener('click', async () => {

  const res = await fetch('/api/crear-pago', {
    method: 'POST',
  });

  const data = await res.json();

  await stripe.redirectToCheckout({
    sessionId: data.id
  });

});
</script>

</body>
</html>
